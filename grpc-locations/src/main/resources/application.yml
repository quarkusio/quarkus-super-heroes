quarkus:
  application:
    name: grpc-locations
  banner:
    path: banner.txt
  log:
    level: INFO
    category:
      "io.quarkus.sample.superheroes":
        level: DEBUG
    console:
      level: INFO
      darken: 1
  http:
    port: 8089
    test-port: 0
  grpc:
    server:
      use-separate-server: false
      enable-reflection-service: true
      port: "${quarkus.http.port}"
      test-port: "${quarkus.http.test-port}"
  datasource:
    jdbc:
      telemetry: true
    devservices:
      image-name: mariadb:11.5
  otel:
    resource:
      attributes: "app=${quarkus.application.name},application=grpc-locations,system=quarkus-super-heroes"
    exporter:
      otlp:
        protocol: http/protobuf
    metrics:
      enabled: true
    logs:
      enabled: true
  hibernate-orm:
    schema-management:
      strategy: drop-and-create
  container-image:
    builder: docker
    registry: quay.io
    group: quarkus-super-heroes
    name: "${quarkus.application.name}"
  kubernetes:
    part-of: locations-service
    annotations:
      "app.openshift.io/connects-to": locations-db,otel-lgtm
    env:
      configmaps: "${quarkus.application.name}-config"
      secrets: "${quarkus.application.name}-config-creds"
    labels:
      app: "${quarkus.application.name}"
      application: "${quarkus.kubernetes.part-of}"
      system: quarkus-super-heroes
  openshift:
    base-jvm-image: registry.access.redhat.com/ubi10/openjdk-25:1.24
    base-native-image: quay.io/quarkus/ubi-quarkus-native-binary-s2i:2.0
    deployment-kind: deployment
    route:
      expose: true
      tls:
        termination: edge
        insecure-edge-termination-policy: Redirect
    annotations:
      "app.openshift.io/connects-to": locations-db,otel-lgtm
    labels:
      app: "${quarkus.kubernetes.labels.app}"
      application: "${quarkus.kubernetes.part-of}"
      system: "${quarkus.kubernetes.labels.system}"
  knative:
    annotations:
      "app.openshift.io/connects-to": locations-db,otel-lgtm
      "serverless.openshift.io/default-enable-http2": 'true'
    labels:
      app: "${quarkus.kubernetes.labels.app}"
      application: "${quarkus.kubernetes.part-of}"
      system: "${quarkus.kubernetes.labels.system}"
  helm:
    name: "${quarkus.application.name}"
    description: "Helm chart for ${quarkus.application.name}"
    version: 1.0.0
    create-tar-file: false
    values:
      memoryLimit:
        paths: "(kind == Deployment && metadata.name == ${quarkus.application.name}).spec.template.spec.containers.resources.limits.memory"
      memoryRequest:
        paths: "(kind == Deployment && metadata.name == ${quarkus.application.name}).spec.template.spec.containers.resources.requests.memory"

"%dev,test":
  quarkus:
    log:
      console:
        level: DEBUG

"%prod":
  quarkus:
    hibernate-orm:
      sql-load-script: import.sql

"%kubernetes":
  quarkus:
    config:
      profile:
        parent: prod
    kubernetes:
      deployment-target: kubernetes

"%openshift":
  quarkus:
    config:
      profile:
        parent: prod
    container-image:
      builder: openshift
    kubernetes:
      deployment-target: openshift

"%knative":
  quarkus:
    config:
      profile:
        parent: prod
    kubernetes:
      deployment-target: knative

"%knative-openshift":
  quarkus:
    config:
      profile:
        parent: knative
    container-image:
      builder: openshift

"%minikube":
  quarkus:
    config:
      profile:
        parent: prod
    kubernetes:
      deployment-target: minikube
