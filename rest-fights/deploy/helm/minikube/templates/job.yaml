---
apiVersion: batch/v1
kind: Job
metadata:
  name: rest-fights-liquibase-mongodb-init
spec:
  completionMode: NonIndexed
  template:
    metadata:
      annotations:
        alpha.image.policy.openshift.io/resolve-names: '*'
    spec:
      containers:
        - env:
            - name: QUARKUS_OTEL_K8S_RESOURCE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: QUARKUS_OTEL_K8S_RESOURCE_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: QUARKUS_OTEL_K8S_RESOURCE_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: QUARKUS_OTEL_K8S_RESOURCE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: QUARKUS_OTEL_K8S_RESOURCE_CONTAINER_NAME
              value: rest-fights
            - name: QUARKUS_OTEL_K8S_RESOURCE_DEPLOYMENT_NAME
              value: rest-fights
            - name: QUARKUS_INIT_AND_EXIT
              value: "true"
            - name: QUARKUS_LIQUIBASE_MONGODB_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                name: rest-fights-config-creds
            - configMapRef:
                name: rest-fights-config
          image: quay.io/quarkus-super-heroes/rest-fights:java21-latest
          name: rest-fights-liquibase-mongodb-init
      restartPolicy: OnFailure
      serviceAccountName: rest-fights
