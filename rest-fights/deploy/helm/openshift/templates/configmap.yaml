---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: rest-fights
    application: fights-service
    system: quarkus-super-heroes
  name: rest-fights-config
data:
  quarkus.liquibase-mongodb.migrate-at-start: "false"
  quarkus.mongodb.hosts: fights-db:27017
  quarkus.stork.hero-service.service-discovery.type: static
  quarkus.stork.hero-service.service-discovery.address-list: rest-heroes:80
  quarkus.stork.villain-service.service-discovery.type: static
  quarkus.stork.villain-service.service-discovery.address-list: rest-villains:80
  quarkus.stork.narration-service.service-discovery.type: static
  quarkus.stork.narration-service.service-discovery.address-list: rest-narration:80
  quarkus.grpc.clients.locations.host: grpc-locations
  quarkus.grpc.clients.locations.port: "80"
  quarkus.otel.exporter.otlp.endpoint: http://otel-lgtm:4318
  kafka.bootstrap.servers: PLAINTEXT://fights-kafka:9092
  mp.messaging.connector.smallrye-kafka.apicurio.registry.url: http://apicurio:8080/apis/registry/v2
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: fights-db
    application: fights-service
    system: quarkus-super-heroes
  name: fights-db-init
data:
  get-data.sh: |-
    #!/bin/bash

    curl https://raw.githubusercontent.com/quarkusio/quarkus-super-heroes/main/rest-fights/deploy/db-init/initialize-database.js --output /docker-entrypoint-initdb.d/1-init-database.js
