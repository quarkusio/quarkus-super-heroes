---
app:
  envs:
    QUARKUS_OTEL_K8S_RESOURCE_CONTAINER_NAME: event-statistics
    QUARKUS_OTEL_K8S_RESOURCE_DEPLOYMENT_NAME: event-statistics
  image: quay.io/quarkus-super-heroes/event-statistics:native-latest
  livenessProbe:
    failureThreshold: 3
    httpGet:
      path: /q/health/live
      scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 10
  memoryLimit: 128Mi
  memoryRequest: 32Mi
  ports:
    http: 8085
  readinessProbe:
    failureThreshold: 3
    httpGet:
      path: /q/health/ready
      scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 10
  startupProbe:
    failureThreshold: 3
    httpGet:
      path: /q/health/started
      scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 10
