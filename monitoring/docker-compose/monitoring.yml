services:

  otel-lgtm:
    image: docker.io/grafana/otel-lgtm:0.24.0
    container_name: otel-lgtm
    ports:
      - "3000:3000"  # Grafana UI
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    volumes:
      - ../../deploy/docker-compose/dashboards:/otel-lgtm/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
